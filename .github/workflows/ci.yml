name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [24, 25]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm ci
        working-directory: extension
      - run: npm test
        working-directory: extension
      - run: npm run package
        working-directory: extension
      - uses: actions/upload-artifact@v4
        with:
          name: token-monitor-extension-vsix
          path: extension/*.vsix

  # Publishes to the VS Code Marketplace on version tags (vX.Y.Z).
  # Needs the VSCE_PAT repo secret (Azure DevOps PAT, Marketplace -> Manage).
  marketplace:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm ci
        working-directory: extension
      - run: npx @vscode/vsce publish -p "$VSCE_PAT"
        working-directory: extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
